<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Linguistics Seminar CMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f0f2f5; }
    .login-card {
      max-width: 420px;
      margin: 10vh auto 0;
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(68,90,170,0.15);
    }
    .login-header {
      background: #445AAA;
      color: white;
      border-radius: 16px 16px 0 0;
      padding: 2rem;
      text-align: center;
    }
    .login-header h4 { margin: 0; font-weight: 700; letter-spacing: 0.5px; }
    .login-header small { opacity: 0.8; font-size: 0.85rem; }
    .btn-brand { background: #445AAA; border-color: #445AAA; }
    .btn-brand:hover { background: #3449a0; border-color: #3449a0; }
    #errorMsg { display: none; }
    #checkingMsg { color: #6c757d; font-size: 0.85rem; text-align: center; padding: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="login-header">
      <i class="bi bi-journal-text fs-2 mb-2 d-block"></i>
      <h4>Seminar CMS</h4>
      <small>Languages &amp; Linguistics – WSU</small>
    </div>
    <div class="card-body p-4">
      <p id="checkingMsg"><span class="spinner-border spinner-border-sm me-1"></span> Checking…</p>
      <div id="errorMsg" class="alert alert-danger py-2 small"></div>
      <form id="loginForm" style="display:none">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" autocomplete="username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" autocomplete="current-password" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePw" tabindex="-1">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-brand btn-primary w-100 fw-semibold" id="loginBtn">
          <span id="loginSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    // Already logged in?
    if (localStorage.getItem('cms_token')) window.location.href = 'dashboard.html';

    // Check whether setup is needed first
    (async () => {
      try {
        const res = await fetch('/api/setup');
        const data = await res.json();
        if (data.setupRequired) {
          window.location.href = 'setup.html';
          return;
        }
      } catch { /* network error – show login anyway */ }
      document.getElementById('checkingMsg').style.display = 'none';
      document.getElementById('loginForm').style.display = '';
    })();

    // Password visibility toggle
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      spinner.classList.remove('d-none');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('cms_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = data.error || 'Login failed. Please try again.';
          errorMsg.style.display = 'block';
        }
      } catch {
        errorMsg.textContent = 'Network error. Please check your connection.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
